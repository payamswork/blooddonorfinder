{% extends "base.html" %}
{% block title %}Registered{% endblock %}

{% block content %}
<div class="container">
  <div class="success-wrap">

    <div class="success-mark">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h2>Donor Registered</h2>
    <p>Thank you. Your details have been added to the system. Someone out there may find you at just the right moment.</p>

    <div class="success-actions">
      <a href="/register" class="btn btn-primary">Register Another</a>
      <a href="/search"   class="btn btn-secondary">Search Donors</a>
    </div>

  </div>
</div>
{% endblock %}
