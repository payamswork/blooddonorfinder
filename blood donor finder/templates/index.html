<!DOCTYPE html>
<html>
<head>
    <title>Blood Donor App</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page">

    <section class="hero">

        <p class="eyebrow">Welcome</p>

        <h1>Blood Donor App</h1>

        <p class="hero-text">
            Find blood donors quickly and save lives.
        </p>

        <div class="actions">

            <a href="/register" class="button primary">
                Register Donor
            </a>

            <a href="/search" class="button secondary">
                Search Donor
            </a>

            <a href="/signup" class="button secondary">
                Sign Up
            </a>

            <a href="/login" class="button secondary">
                Login
            </a>

        </div>

    </section>

</div>

</body>
</html>
